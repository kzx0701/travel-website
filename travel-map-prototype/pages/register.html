/* Source: structured-spec — monochrome minimalist palette (black/white/gray) */
/* ============================================================
   PRIMITIVES (theme-independent)
   Six families: brand / background / text / icon are 10-step
   scales; state-success / state-error are functional sets.
   The system is monochrome — `brand` is a refined cool-neutral
   scale used for primary surfaces/actions; the other neutrals
   share the pure-gray ramp. Never consume primitives directly
   in product code — use the semantic role tokens or the
   --color-* alias layer below.
   ============================================================ */
:root {
  
  /* solo-design consumption aliases: explicit prefix for fill-html-head.mjs */
  --minimal-background: var(--background, #ffffff);
  --minimal-foreground: var(--foreground, #0f172a);
  --minimal-card: var(--card, var(--background));
  --minimal-card-foreground: var(--card-foreground, var(--foreground));
  --minimal-popover: var(--popover, var(--card));
  --minimal-popover-foreground: var(--popover-foreground, var(--card-foreground, var(--foreground)));
  --minimal-primary: var(--primary, #111827);
  --minimal-primary-foreground: var(--primary-foreground, #ffffff);
  --minimal-secondary: var(--secondary, var(--muted, var(--card)));
  --minimal-secondary-foreground: var(--secondary-foreground, var(--foreground));
  --minimal-muted: var(--muted, var(--card));
  --minimal-muted-foreground: var(--muted-foreground, var(--foreground));
  --minimal-accent: var(--accent, var(--secondary, var(--muted, var(--card))));
  --minimal-accent-foreground: var(--accent-foreground, var(--foreground));
  --minimal-destructive: var(--destructive, #ef4444);
  --minimal-destructive-foreground: var(--destructive-foreground, #ffffff);
  --minimal-border: var(--border, currentColor);
  --minimal-input: var(--input, var(--border));
  --minimal-ring: var(--ring, var(--primary));
  --minimal-chart-1: var(--chart-1, var(--primary));
  --minimal-chart-2: var(--chart-2, var(--secondary, var(--primary)));
  --minimal-chart-3: var(--chart-3, var(--accent, var(--primary)));
  --minimal-chart-4: var(--chart-4, var(--muted-foreground, var(--foreground)));
  --minimal-chart-5: var(--chart-5, var(--foreground));
  --minimal-sidebar: var(--sidebar, var(--background));
  --minimal-sidebar-foreground: var(--sidebar-foreground, var(--foreground));
  --minimal-sidebar-primary: var(--sidebar-primary, var(--primary));
  --minimal-sidebar-primary-foreground: var(--sidebar-primary-foreground, var(--primary-foreground));
  --minimal-sidebar-accent: var(--sidebar-accent, var(--accent, var(--muted, var(--card))));
  --minimal-sidebar-accent-foreground: var(--sidebar-accent-foreground, var(--accent-foreground, var(--foreground)));

/* brand — refined cool-neutral identity (primary, ring, charts) */
  --brand-50: #fafafa;
  --brand-100: #f4f4f5;
  --brand-200: #e4e4e7;
  --brand-300: #d4d4d8;
  --brand-400: #a1a1aa;
  --brand-500: #71717a;
  --brand-600: #52525b;
  --brand-700: #3f3f46;
  --brand-800: #27272a;
  --brand-900: #18181b; /* @primary */

  /* background — pure-neutral surface ramp (page, card, muted, dark surfaces) */
  --background-50: #ffffff; /* @primary */
  --background-100: #fafafa;
  --background-200: #f5f5f5;
  --background-300: #e5e5e5;
  --background-400: #d4d4d4;
  --background-500: #a3a3a3;
  --background-600: #404040;
  --background-700: #262626;
  --background-800: #171717;
  --background-900: #0a0a0a;

  /* text — pure-neutral ink ramp (foreground, secondary, muted, inverse) */
  --text-50: #fafafa;
  --text-100: #ededed;
  --text-200: #d4d4d4;
  --text-300: #a1a1a1;
  --text-400: #858585;
  --text-500: #6e6e6e;
  --text-600: #525252;
  --text-700: #404040;
  --text-800: #171717;
  --text-900: #0a0a0a;

  /* icon — pure-neutral icon ramp (default, muted, disabled, inverse) */
  --icon-50: #fafafa;
  --icon-100: #e5e5e5;
  --icon-200: #d4d4d4;
  --icon-300: #b0b0b0;
  --icon-400: #8f8f8f;
  --icon-500: #6e6e6e;
  --icon-600: #525252;
  --icon-700: #404040;
  --icon-800: #262626; /* @primary */
  --icon-900: #0a0a0a;

  /* ============================================================
     SEMANTIC ROLE TOKENS — light theme
     ============================================================ */

  /* surfaces */
  --background: var(--background-50);
  --card: var(--background-50);
  --popover: var(--background-50);
  --muted: var(--background-100);

  /* foregrounds */
  --foreground: var(--brand-900);
  --card-foreground: var(--brand-900);
  --popover-foreground: var(--brand-900);
  --primary-foreground: var(--brand-50);
  --secondary-foreground: var(--brand-900);
  --muted-foreground: var(--brand-500);
  --accent-foreground: var(--brand-900);
  --destructive-foreground: var(--background-50);
  --sidebar-foreground: var(--brand-900);
  --sidebar-primary-foreground: var(--brand-50);
  --sidebar-accent-foreground: var(--brand-900);

  /* roles */
  --primary: var(--brand-900);
  --secondary: var(--brand-100);
  --accent: var(--brand-100);
  --input: var(--brand-200);
  --ring: var(--brand-900);

  /* border */
  --border: var(--brand-200);
  --border-strong: var(--brand-300);

  /* state-success */
  --success: #16a34a;
  --success-foreground: var(--background-50);
  --success-subtle: #f0fdf4;
  --success-border: #bbf7d0;
  --success-text: #15803d;

  /* state-error (exposed as destructive for component compatibility) */
  --destructive: #dc2626;
  --destructive-subtle: #fef2f2;
  --destructive-border: #fecaca;
  --destructive-text: #b91c1c;

  /* brand surfaces (tints for badges, selected/active backgrounds) */
  --brand-subtle: var(--brand-100);
  --brand-border: var(--brand-300);

  /* chart — monochrome ramp from light to near-black for quiet fancy data */
  --chart-1: var(--brand-200);
  --chart-2: var(--brand-400);
  --chart-3: var(--brand-600);
  --chart-4: var(--brand-800);
  --chart-5: var(--brand-900);

  /* sidebar — first-class tonal sub-system */
  --sidebar: var(--brand-50);
  --sidebar-primary: var(--brand-900);
  --sidebar-accent: var(--brand-100);
  --sidebar-border: var(--brand-200);
  --sidebar-ring: var(--brand-400);

  /* typography */
  --font-sans: Geist, ui-sans-serif, sans-serif, system-ui;
  --font-serif: DM Serif Display, ui-serif, serif;
  --font-mono: Geist Mono, ui-monospace, monospace;
  --tracking-normal: 0em;
  --tracking-tight: -0.012em;

  /* radius — modern minimal (12px base) */
  --radius: 0.75rem;
  --radius-sm: 0.375rem;
  --radius-lg: 1rem;

  /* shadow — subtle, layered for fancy depth */
  --shadow-2xs: 0 1px 0 0 rgba(0, 0, 0, 0.04);
  --shadow-xs: 0 1px 1px 0 rgba(0, 0, 0, 0.04);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 1px 1px 0 rgba(0, 0, 0, 0.03);
  --shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.06), 0 1px 2px 0 rgba(0, 0, 0, 0.03);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.07), 0 2px 4px -1px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 12px 20px -6px rgba(0, 0, 0, 0.08), 0 4px 8px -2px rgba(0, 0, 0, 0.04);
  --shadow-xl: 0 24px 40px -10px rgba(0, 0, 0, 0.10), 0 8px 16px -4px rgba(0, 0, 0, 0.06);
  --shadow-2xl: 0 32px 56px -14px rgba(0, 0, 0, 0.14);

  /* layout */
  --spacing: 0.25rem;

  /* ============================================================
     ALIAS LAYER — preferred names for component authoring.
     Resolves lazily, so it inherits the .dark overrides below.
     ============================================================ */
  --color-surface: var(--background);
  --color-surface-muted: var(--muted);
  --color-text: var(--foreground); /* @primary */
  --color-text-muted: var(--muted-foreground);
  --color-primary: var(--primary);
  --color-primary-foreground: var(--primary-foreground);
  --color-brand: var(--primary);
  --color-brand-subtle: var(--brand-subtle);
  --color-brand-border: var(--brand-border);
  --color-border: var(--border);
  --color-border-strong: var(--border-strong);
  --color-success-50: var(--success-subtle);
  --color-success-200: var(--success-border);
  --color-success-600: var(--success);
  --color-success-700: var(--success-text);
  --color-danger-50: var(--destructive-subtle);
  --color-danger-200: var(--destructive-border);
  --color-danger-600: var(--destructive);
  --color-danger-700: var(--destructive-text);
  --space-4: var(--spacing);
  --radius-md: var(--radius);
}

/* ============================================================
   SEMANTIC ROLE TOKENS — dark theme overrides only.
   Primitives, charts, alias layer, type, radius, shadow and
   spacing are inherited from :root unchanged.
   ============================================================ */
.dark {
  /* surfaces */
  --background: var(--brand-900);
  --card: var(--brand-800);
  --popover: var(--brand-800);
  --muted: var(--brand-800);

  /* foregrounds */
  --foreground: var(--brand-50);
  --card-foreground: var(--brand-50);
  --popover-foreground: var(--brand-50);
  --primary-foreground: var(--brand-900);
  --secondary-foreground: var(--brand-50);
  --muted-foreground: var(--brand-400);
  --accent-foreground: var(--brand-50);
  --destructive-foreground: var(--brand-50);
  --sidebar-foreground: var(--brand-50);
  --sidebar-primary-foreground: var(--brand-900);
  --sidebar-accent-foreground: var(--brand-50);

  /* roles */
  --primary: var(--brand-50);
  --secondary: var(--brand-800);
  --accent: var(--brand-700);
  --input: var(--brand-700);
  --ring: var(--brand-300);

  /* border */
  --border: var(--brand-700);
  --border-strong: var(--brand-600);

  /* state-success */
  --success: #22c55e;
  --success-foreground: #052e16;
  --success-subtle: #0f2417;
  --success-border: #166534;
  --success-text: #4ade80;

  /* state-error */
  --destructive: #ef4444;
  --destructive-subtle: #2a1416;
  --destructive-border: #7f1d1d;
  --destructive-text: #fca5a5;

  /* brand surfaces */
  --brand-subtle: var(--brand-800);
  --brand-border: var(--brand-700);

  /* chart — flipped monochrome ramp for dark surfaces */
  --chart-1: var(--brand-700);
  --chart-2: var(--brand-500);
  --chart-3: var(--brand-300);
  --chart-4: var(--brand-200);
  --chart-5: var(--brand-50);

  /* sidebar */
  --sidebar: var(--brand-800);
  --sidebar-primary: var(--brand-50);
  --sidebar-accent: var(--brand-700);
  --sidebar-border: var(--brand-700);
  --sidebar-ring: var(--brand-400);
}

/* ── Sidebar ───────────────────────────────────────────────── */
/* @anatomy
   <div class="row"><span class="label">Default</span><aside class="sidebar"><div class="brand">Minimal Dashboard</div><div class="section">Workspace</div><nav class="nav"><button class="item active"><span class="dot"></span><span>Overview</span></button><button class="item"><span class="dot"></span><span>Revenue</span></button><button class="item"><span class="dot"></span><span>Users</span></button><button class="item"><span class="dot"></span><span>Team</span></button></nav><div class="foot"><button class="item"><span class="dot"></span><span>Settings</span></button></div></aside><aside class="sidebar" aria-disabled="true"><div class="brand">Minimal Dashboard</div><div class="section">Workspace</div><nav class="nav"><button class="item active" aria-disabled="true"><span class="dot"></span><span>Overview</span></button><button class="item" aria-disabled="true"><span class="dot"></span><span>Revenue</span></button><button class="item" aria-disabled="true"><span class="dot"></span><span>Users</span></button></nav><div class="foot"><button class="item" aria-disabled="true"><span class="dot"></span><span>Settings</span></button></div></aside></div><hr class="divider"><div class="row"><span class="label">Compact</span><aside class="sidebar compact"><div class="brand">MD</div><nav class="nav"><button class="item active" aria-label="Overview"><span class="dot"></span></button><button class="item" aria-label="Revenue"><span class="dot"></span></button><button class="item" aria-label="Active Users"><span class="dot"></span></button><button class="item" aria-label="Team"><span class="dot"></span></button></nav><div class="foot"><button class="item" aria-label="Settings"><span class="dot"></span></button></div></aside><aside class="sidebar compact" aria-disabled="true"><div class="brand">MD</div><nav class="nav"><button class="item active" aria-disabled="true" aria-label="Overview"><span class="dot"></span></button><button class="item" aria-disabled="true" aria-label="Revenue"><span class="dot"></span></button><button class="item" aria-disabled="true" aria-label="Team"><span class="dot"></span></button></nav><div class="foot"><button class="item" aria-disabled="true" aria-label="Settings"><span class="dot"></span></button></div></aside></div>
*/
body{margin:0;padding:12px;background:var(--color-surface);color:var(--color-text);font:500 14px/1.4 var(--font-sans)}.row{display:flex;align-items:flex-start;gap:var(--space-4);flex-wrap:wrap;margin-bottom:8px}.label{width:72px;padding-top:8px;color:var(--color-text-muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase}.sidebar{width:224px;min-height:248px;display:flex;flex-direction:column;gap:12px;padding:14px;background:var(--sidebar);color:var(--sidebar-foreground);border:1px solid var(--sidebar-border);border-radius:var(--radius-md);box-shadow:var(--shadow-sm)}.compact{width:86px;padding-inline:10px}.brand{font-weight:700;color:var(--sidebar-primary)}.section{color:var(--color-text-muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase}.nav,.foot{display:flex;flex-direction:column;gap:6px}.item{display:flex;align-items:center;gap:10px;min-height:34px;padding:0 10px;border:0;border-radius:var(--radius-md);background:transparent;color:inherit;font:inherit;text-align:left}.compact .item{justify-content:center;padding:0}.dot{width:8px;height:8px;border-radius:999px;background:currentColor;opacity:.72}.active{background:var(--sidebar-primary);color:var(--sidebar-primary-foreground);box-shadow:var(--shadow-xs)}.item:hover{background:var(--sidebar-accent);color:var(--sidebar-accent-foreground)}.item[aria-disabled=true],.sidebar[aria-disabled=true] .item{opacity:.46;cursor:not-allowed}.foot{margin-top:auto;padding-top:8px;border-top:1px solid var(--sidebar-border)}.divider{margin:10px 0;border:0;border-top:1px solid var(--color-border)}

/* ── Table ─────────────────────────────────────────────────── */
/* @anatomy
   <div class="row">
   <span class="label">Comfortable</span>
   <div class="table-card"><table class="table" aria-label="Overview revenue table"><thead><tr><th>View</th><th>Owner</th><th>Status</th></tr></thead><tbody><tr><td>Overview</td><td>Team</td><td><span class="pill">Live</span></td></tr><tr><td>Revenue</td><td>Settings</td><td>Updated</td></tr><tr><td>Active Users</td><td>Team</td><td>Stable</td></tr></tbody></table></div>
   <div class="table-card is-disabled"><table class="table" aria-label="Disabled overview revenue table"><thead><tr><th>View</th><th>Owner</th><th>Status</th></tr></thead><tbody><tr><td>Overview</td><td>Team</td><td><span class="pill">Live</span></td></tr><tr><td>Revenue</td><td>Settings</td><td>Updated</td></tr><tr><td>Active Users</td><td>Team</td><td>Stable</td></tr></tbody></table></div>
   </div>
   <hr class="divider">
   <div class="row">
   <span class="label">Compact</span>
   <div class="table-card selected"><table class="table compact" aria-label="Compact selected table"><thead><tr><th>View</th><th>Owner</th><th>Status</th></tr></thead><tbody><tr><td>Revenue</td><td>Settings</td><td>Synced</td></tr><tr><td>Active Users</td><td>Team</td><td><span class="pill">Selected</span></td></tr><tr><td>Team</td><td>Overview</td><td>Ready</td></tr></tbody></table></div>
   <div class="table-card empty">Settings has no rows to review.</div>
   </div>
*/
body{margin:0;padding:12px;background:var(--color-surface);color:var(--color-text);font:13px/1.4 var(--font-sans)}.row{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap}.label{width:100%;font:600 10px/1 var(--font-mono);letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-muted)}.divider{margin:8px 0;border:0;border-top:1px solid var(--color-border)}.table-card{min-width:220px;flex:1;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);overflow:hidden}.table-card.is-disabled{opacity:.45}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px;border-bottom:1px solid var(--color-border);text-align:left}.table th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-muted);background:var(--color-surface-muted)}.table td{color:var(--color-text)}.compact th,.compact td{padding:8px 12px}.selected tbody tr:nth-child(2){background:var(--color-surface-muted)}.pill{display:inline-flex;padding:4px 8px;border-radius:var(--radius-md);background:var(--color-primary);color:var(--color-primary-foreground);font-size:11px;line-height:1}.empty{display:grid;place-items:center;min-height:132px;padding:12px;color:var(--color-text-muted);background:var(--color-surface-muted)}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--minimal-background);
    --color-foreground: var(--minimal-foreground);
    --color-card: var(--minimal-card);
    --color-card-foreground: var(--minimal-card-foreground);
    --color-popover: var(--minimal-popover);
    --color-popover-foreground: var(--minimal-popover-foreground);
    --color-primary: var(--minimal-primary);
    --color-primary-foreground: var(--minimal-primary-foreground);
    --color-secondary: var(--minimal-secondary);
    --color-secondary-foreground: var(--minimal-secondary-foreground);
    --color-muted: var(--minimal-muted);
    --color-muted-foreground: var(--minimal-muted-foreground);
    --color-accent: var(--minimal-accent);
    --color-accent-foreground: var(--minimal-accent-foreground);
    --color-destructive: var(--minimal-destructive);
    --color-destructive-foreground: var(--minimal-destructive-foreground);
    --color-border: var(--minimal-border);
    --color-input: var(--minimal-input);
    --color-ring: var(--minimal-ring);
    --color-chart-1: var(--minimal-chart-1);
    --color-chart-2: var(--minimal-chart-2);
    --color-chart-3: var(--minimal-chart-3);
    --color-chart-4: var(--minimal-chart-4);
    --color-chart-5: var(--minimal-chart-5);
    --color-sidebar: var(--minimal-sidebar);
    --color-sidebar-foreground: var(--minimal-sidebar-foreground);
    --color-sidebar-primary: var(--minimal-sidebar-primary);
    --color-sidebar-primary-foreground: var(--minimal-sidebar-primary-foreground);
    --color-sidebar-accent: var(--minimal-sidebar-accent);
    --color-sidebar-accent-foreground: var(--minimal-sidebar-accent-foreground);
  }
  @layer base {
    body { background: var(--minimal-background); color: var(--minimal-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="flex min-h-screen items-center justify-center px-4">
      <div class="w-full max-w-sm">
        <!-- Brand -->
        <div class="mb-10 text-center">
          <h1 class="text-2xl font-semibold tracking-tight" style="color: var(--minimal-foreground);">足迹地图</h1>
        </div>

        <!-- Register Form Card -->
        <div class="rounded-xl border p-6" style="border-color: var(--minimal-border); background: var(--minimal-card);">
          <form class="flex flex-col gap-5" onsubmit="return false;">
            <!-- Email -->
            <div class="flex flex-col gap-1.5">
              <label for="email" class="text-sm font-medium" style="color: var(--minimal-foreground);">邮箱</label>
              <input
                id="email"
                type="email"
                placeholder="you@example.com"
                autocomplete="email"
                class="h-9 rounded-lg border bg-transparent px-3 text-sm outline-none transition-colors duration-150 focus:ring-2 focus:ring-offset-0"
                style="border-color: var(--minimal-input); color: var(--minimal-foreground); --tw-ring-color: var(--minimal-ring);"
                onfocus="this.style.borderColor='var(--minimal-ring)'; this.style.boxShadow='0 0 0 2px var(--minimal-brand-subtle)'"
                onblur="this.style.borderColor='var(--minimal-input)'; this.style.boxShadow='none'"
              />
            </div>

            <!-- Password -->
            <div class="flex flex-col gap-1.5">
              <label for="password" class="text-sm font-medium" style="color: var(--minimal-foreground);">密码</label>
              <input
                id="password"
                type="password"
                placeholder="至少 6 位"
                autocomplete="new-password"
                class="h-9 rounded-lg border bg-transparent px-3 text-sm outline-none transition-colors duration-150"
                style="border-color: var(--minimal-input); color: var(--minimal-foreground); --tw-ring-color: var(--minimal-ring);"
                onfocus="this.style.borderColor='var(--minimal-ring)'; this.style.boxShadow='0 0 0 2px var(--minimal-brand-subtle)'"
                onblur="this.style.borderColor='var(--minimal-input)'; this.style.boxShadow='none'"
              />
            </div>

            <!-- Confirm Password -->
            <div class="flex flex-col gap-1.5">
              <label for="confirm-password" class="text-sm font-medium" style="color: var(--minimal-foreground);">确认密码</label>
              <input
                id="confirm-password"
                type="password"
                placeholder="再次输入密码"
                autocomplete="new-password"
                class="h-9 rounded-lg border bg-transparent px-3 text-sm outline-none transition-colors duration-150"
                style="border-color: var(--minimal-input); color: var(--minimal-foreground); --tw-ring-color: var(--minimal-ring);"
                onfocus="this.style.borderColor='var(--minimal-ring)'; this.style.boxShadow='0 0 0 2px var(--minimal-brand-subtle)'"
                onblur="this.style.borderColor='var(--minimal-input)'; this.style.boxShadow='none'"
              />
            </div>

            <!-- Submit -->
            <button
              type="submit"
              class="btn primary h-9 w-full rounded-lg text-sm font-semibold transition-transform duration-120"
              style="margin-top: 4px;"
              onmousedown="this.style.transform='scale(0.98)'"
              onmouseup="this.style.transform='scale(1)'"
              onmouseleave="this.style.transform='scale(1)'"
            >
              注册
            </button>
          </form>
        </div>

        <!-- Login link -->
        <p class="mt-6 text-center text-sm" style="color: var(--minimal-muted-foreground);">
          已有账号？
          <a
            href="login.html"
            data-dom-id="link-login"
            class="font-medium underline-offset-4 hover:underline transition-colors duration-150"
            style="color: var(--minimal-foreground);"
          >
            登录
          </a>
        </p>
      </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
